<main><h1><?php echo $data['catalog']['title']; ?></h1><?php foreach ( $data['catalog']['sections'] as $data_1 ) { ?><section data-slug="<?php echo $data_1['meta']['slug']; ?>"><h2><?php echo $data_1['heading']; ?></h2><?php foreach ( $data_1['products'] as $data_2 ) { ?><article data-sku="<?php echo $data_2['details']['sku']; ?>"><h3><?php echo $data_2['name']; ?></h3><?php if ( $data_2['available'] ) { ?><p><?php echo $data_2['details']['manufacturer']['name']; ?></p><?php } ?><?php if ( $data_2['featured'] ) { ?><strong>Featured</strong><?php } else { ?><span>Standard</span><?php } ?><ul><?php foreach ( $data_2['badges'] as $data_3 ) { ?><li><span className="badge" data-tone="<?php echo $data_3['meta']['tone']; ?>"><?php if ( $data_3['highlighted'] ) { ?><strong><?php echo $data_3['label']; ?></strong><?php } else { ?><em><?php echo $data_3['label']; ?></em><?php } ?></span></li><?php } ?></ul></article><?php } ?></section><?php } ?></main>
