<main><header><h1><?php echo $data['title']; ?></h1><p><?php echo $data['summary']; ?></p></header><?php if ( $data['status'] === 'published' ) { ?><aside>Published</aside><?php } ?><?php if ( $data['visible'] ) { ?><section className="catalog"><?php foreach ( $data['products'] as $data_1 ) { ?><article className="product-card"><a href="<?php echo $data_1['url']; ?>"><h2><?php echo $data_1['name']; ?></h2></a><input type="hidden" value="<?php echo $data_1['name']; ?>" jsxtv_value="<?php echo $data_1['name']; ?>"><?php if ( $data_1['available'] ) { ?><p className="price"><?php echo $data_1['price']; ?></p><?php } ?><?php if ( ! $data_1['available'] ) { ?><p className="unavailable">Unavailable</p><?php } ?><?php if ( $data_1['mode'] === 'grid' ) { ?><div className="grid-only">Grid layout</div><?php } ?><?php if ( $data_1['status'] !== 'archived' ) { ?><small>Visible product</small><?php } ?><?php if ( $data_1['featured'] ) { ?><strong>Featured</strong><?php } else { ?><span>Standard</span><?php } ?><?php if ( $data_1['tone'] === 'sale' ) { ?><em>Sale</em><?php } else { ?><em>Info</em><?php } ?><div className="badges"><?php foreach ( $data_1['badges'] as $data_2 ) { ?><span className="badge" data-tone="<?php echo $data_2['tone']; ?>"><?php echo $data_2['label']; ?></span><?php } ?></div></article><?php } ?></section><?php } ?></main>
